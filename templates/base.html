<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Matcher v1.0</title>
    <!-- Using Bootstrap for instant prettiness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .main-container { max-width: 800px; margin-top: 50px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container main-container">
        {% block content %}{% endblock %}
    </div>
    <script>
        // IH#7: FLEXIBILITY - Allow "Enter" key to submit
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { document.querySelector('form').submit(); }
        });
    </script>
</body>
</html>
