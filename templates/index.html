{% extends "base.html" %}
{% block content %}
    <h1 class="mb-4">Resume Keyword Matcher</h1>
    <!-- IH#1: DESCRIPTION -->
    <p class="text-muted">Compare your resume against a job description to find critical skill gaps.</p>
    
    <form action="/analyze" method="post">
        <div class="mb-3">
            <label class="form-label">Your Resume</label>
            <textarea name="resume" class="form-control" rows="6" placeholder="Paste resume text..." required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="job" class="form-control" rows="6" placeholder="Paste job details..." required></textarea>
        </div>
        <!-- IH#6: NEXT STEPS - Clear call to action -->
        <button type="submit" class="btn btn-primary w-100">Analyze Application</button>
    </form>
{% endblock %}
